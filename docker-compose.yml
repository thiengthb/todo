# Compose này CHỈ dùng chạy thử local (dev). Trên NUC dùng
# /opt/apps/todo/docker-compose.yml (pull image từ ghcr.io, route qua Traefik).
# Migration Prisma đã nhúng vào entrypoint của image — không cần service riêng.
services:
  todo:
    build: .
    image: smart-todo:local
    container_name: smart-todo
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3002}:3000"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
    volumes:
      - todo_data:/data

volumes:
  # SQLite sống qua mọi lần redeploy
  todo_data:
