<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Progress bar</title>
    <style>
      /* tokens — copied verbatim from todo/app/globals.css (2026-06-14).
         Tones map to PROGRESS_TONE_VAR (progress-ring.tsx). */
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --muted: oklch(0.97 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --accent-brand: oklch(0.52 0.19 273);
        --ok: oklch(0.58 0.13 155);
        --warn: oklch(0.6 0.14 70);
        --alert: oklch(0.585 0.2 20);
      }
      .dark {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --accent-brand: oklch(0.7 0.16 273);
        --ok: oklch(0.72 0.14 155);
        --warn: oklch(0.8 0.13 75);
        --alert: oklch(0.71 0.18 20);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .ds-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100%;
      }
      .ds-pane {
        padding: 24px;
        background: var(--background);
        color: var(--foreground);
      }
      .ds-label {
        margin: 0 0 16px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .cap {
        width: 56px;
        font-size: 12px;
        color: var(--muted-foreground);
      }
      .pbar {
        position: relative;
        height: 6px;
        width: 200px;
        border-radius: 9999px;
        background: var(--muted);
        overflow: hidden;
      }
      .pbar-fill {
        height: 100%;
        border-radius: 9999px;
      }
      .pbar-tick {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: color-mix(in oklch, var(--foreground) 50%, transparent);
      }
    </style>
  </head>
  <body>
    <div class="ds-wrap">
      <div class="ds-pane">
        <p class="ds-label">Progress bar · light</p>
        <div class="row">
          <span class="cap">neutral</span>
          <div class="pbar"><div class="pbar-fill" style="width: 35%; background: var(--foreground)"></div></div>
        </div>
        <div class="row">
          <span class="cap">ok</span>
          <div class="pbar"><div class="pbar-fill" style="width: 70%; background: var(--ok)"></div></div>
        </div>
        <div class="row">
          <span class="cap">warn + tick</span>
          <div class="pbar">
            <div class="pbar-fill" style="width: 45%; background: var(--warn)"></div>
            <span class="pbar-tick" style="left: 60%"></span>
          </div>
        </div>
        <div class="row">
          <span class="cap">alert</span>
          <div class="pbar"><div class="pbar-fill" style="width: 20%; background: var(--alert)"></div></div>
        </div>
        <div class="row">
          <span class="cap">brand</span>
          <div class="pbar"><div class="pbar-fill" style="width: 85%; background: var(--accent-brand)"></div></div>
        </div>
      </div>
      <div class="dark ds-pane">
        <p class="ds-label">Progress bar · dark</p>
        <div class="row">
          <span class="cap">neutral</span>
          <div class="pbar"><div class="pbar-fill" style="width: 35%; background: var(--foreground)"></div></div>
        </div>
        <div class="row">
          <span class="cap">ok</span>
          <div class="pbar"><div class="pbar-fill" style="width: 70%; background: var(--ok)"></div></div>
        </div>
        <div class="row">
          <span class="cap">warn + tick</span>
          <div class="pbar">
            <div class="pbar-fill" style="width: 45%; background: var(--warn)"></div>
            <span class="pbar-tick" style="left: 60%"></span>
          </div>
        </div>
        <div class="row">
          <span class="cap">alert</span>
          <div class="pbar"><div class="pbar-fill" style="width: 20%; background: var(--alert)"></div></div>
        </div>
        <div class="row">
          <span class="cap">brand</span>
          <div class="pbar"><div class="pbar-fill" style="width: 85%; background: var(--accent-brand)"></div></div>
        </div>
      </div>
    </div>
  </body>
</html>
