<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Button</title>
    <style>
      /* tokens — copied verbatim from todo/app/globals.css (2026-06-14) */
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --primary: oklch(0.205 0 0);
        --primary-foreground: oklch(0.985 0 0);
        --secondary: oklch(0.97 0 0);
        --secondary-foreground: oklch(0.205 0 0);
        --muted: oklch(0.97 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --destructive: oklch(0.577 0.245 27.325);
        --border: oklch(0.922 0 0);
        --accent-brand: oklch(0.52 0.19 273);
        --radius: 0.625rem;
      }
      .dark {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --primary: oklch(0.922 0 0);
        --primary-foreground: oklch(0.205 0 0);
        --secondary: oklch(0.269 0 0);
        --secondary-foreground: oklch(0.985 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --destructive: oklch(0.704 0.191 22.216);
        --border: oklch(1 0 0 / 10%);
        --accent-brand: oklch(0.7 0.16 273);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .ds-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100%;
      }
      .ds-pane {
        padding: 24px;
        background: var(--background);
        color: var(--foreground);
      }
      .ds-label {
        margin: 0 0 16px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .ds-sub {
        margin: 18px 0 8px;
        font-size: 11px;
        color: var(--muted-foreground);
      }
      .ds-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 32px;
        padding: 0 10px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
        cursor: pointer;
      }
      .btn--default {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .btn--outline {
        border-color: var(--border);
        background: var(--background);
        color: var(--foreground);
      }
      .btn--secondary {
        background: var(--secondary);
        color: var(--secondary-foreground);
      }
      .btn--ghost {
        background: transparent;
        color: var(--foreground);
      }
      .btn--destructive {
        background: color-mix(in oklch, var(--destructive) 10%, transparent);
        color: var(--destructive);
      }
      .btn--link {
        background: transparent;
        color: var(--accent-brand);
        text-decoration: none;
      }
      .btn--link:hover {
        text-decoration: underline;
      }
      .btn--xs {
        height: 24px;
        padding: 0 8px;
        font-size: 12px;
        border-radius: 8px;
      }
      .btn--sm {
        height: 28px;
        padding: 0 10px;
        font-size: 12.8px;
        border-radius: 8px;
      }
      .btn--lg {
        height: 36px;
        padding: 0 10px;
      }
      .btn--icon {
        width: 32px;
        height: 32px;
        padding: 0;
      }
      .btn[disabled] {
        opacity: 0.5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="ds-wrap">
      <div class="ds-pane">
        <p class="ds-label">Button · light</p>
        <p class="ds-sub">variants</p>
        <div class="ds-row">
          <button class="btn btn--default">Default</button>
          <button class="btn btn--secondary">Secondary</button>
          <button class="btn btn--outline">Outline</button>
          <button class="btn btn--ghost">Ghost</button>
          <button class="btn btn--destructive">Delete</button>
          <button class="btn btn--link">Link</button>
        </div>
        <p class="ds-sub">sizes</p>
        <div class="ds-row">
          <button class="btn btn--default btn--xs">xs</button>
          <button class="btn btn--default btn--sm">sm</button>
          <button class="btn btn--default">default</button>
          <button class="btn btn--default btn--lg">lg</button>
          <button class="btn btn--default btn--icon" aria-label="icon">＋</button>
          <button class="btn btn--default" disabled>disabled</button>
        </div>
      </div>
      <div class="dark ds-pane">
        <p class="ds-label">Button · dark</p>
        <p class="ds-sub">variants</p>
        <div class="ds-row">
          <button class="btn btn--default">Default</button>
          <button class="btn btn--secondary">Secondary</button>
          <button class="btn btn--outline">Outline</button>
          <button class="btn btn--ghost">Ghost</button>
          <button class="btn btn--destructive">Delete</button>
          <button class="btn btn--link">Link</button>
        </div>
        <p class="ds-sub">sizes</p>
        <div class="ds-row">
          <button class="btn btn--default btn--xs">xs</button>
          <button class="btn btn--default btn--sm">sm</button>
          <button class="btn btn--default">default</button>
          <button class="btn btn--default btn--lg">lg</button>
          <button class="btn btn--default btn--icon" aria-label="icon">＋</button>
          <button class="btn btn--default" disabled>disabled</button>
        </div>
      </div>
    </div>
  </body>
</html>
