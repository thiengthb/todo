<!-- @dsCard group="Forms" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Input</title>
    <style>
      /* tokens — copied verbatim from todo/app/globals.css (2026-06-14) */
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --destructive: oklch(0.577 0.245 27.325);
        --input: oklch(0.922 0 0);
        --accent-brand: oklch(0.52 0.19 273);
        --ring: var(--accent-brand);
        --radius: 0.625rem;
      }
      .dark {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --destructive: oklch(0.704 0.191 22.216);
        --input: oklch(1 0 0 / 15%);
        --accent-brand: oklch(0.7 0.16 273);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .ds-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100%;
      }
      .ds-pane {
        padding: 24px;
        background: var(--background);
        color: var(--foreground);
      }
      .ds-label {
        margin: 0 0 16px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .ds-stack {
        display: grid;
        gap: 14px;
        max-width: 280px;
      }
      .ds-field-label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted-foreground);
      }
      .input {
        height: 32px;
        width: 100%;
        padding: 4px 10px;
        border: 1px solid var(--input);
        border-radius: var(--radius);
        background: transparent;
        color: var(--foreground);
        font: inherit;
        font-size: 14px;
        outline: none;
      }
      .input::placeholder {
        color: var(--muted-foreground);
      }
      .input--focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 50%, transparent);
      }
      .input--invalid {
        border-color: var(--destructive);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--destructive) 20%, transparent);
      }
      .input--disabled {
        background: color-mix(in oklch, var(--input) 50%, transparent);
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="ds-wrap">
      <div class="ds-pane">
        <p class="ds-label">Input · light</p>
        <div class="ds-stack">
          <div>
            <label class="ds-field-label">Default</label>
            <input class="input" placeholder="Add a task…" />
          </div>
          <div>
            <label class="ds-field-label">Focused</label>
            <input class="input input--focus" value="Write the spec" />
          </div>
          <div>
            <label class="ds-field-label">Invalid</label>
            <input class="input input--invalid" value="" placeholder="Required" />
          </div>
          <div>
            <label class="ds-field-label">Disabled</label>
            <input class="input input--disabled" value="Locked" disabled />
          </div>
        </div>
      </div>
      <div class="dark ds-pane">
        <p class="ds-label">Input · dark</p>
        <div class="ds-stack">
          <div>
            <label class="ds-field-label">Default</label>
            <input class="input" placeholder="Add a task…" />
          </div>
          <div>
            <label class="ds-field-label">Focused</label>
            <input class="input input--focus" value="Write the spec" />
          </div>
          <div>
            <label class="ds-field-label">Invalid</label>
            <input class="input input--invalid" value="" placeholder="Required" />
          </div>
          <div>
            <label class="ds-field-label">Disabled</label>
            <input class="input input--disabled" value="Locked" disabled />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
