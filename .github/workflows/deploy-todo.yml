name: Deploy Smart Todo to miniserver

on:
  push:
    branches: [main]
    paths:
      - 'todo/**'
      - '.github/workflows/deploy-todo.yml'
  workflow_dispatch:

concurrency:
  group: deploy-todo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: todo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker compose build --pull

      - name: Deploy (up -d)
        env:
          # Settings → Secrets and variables → Actions
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gemini-2.5-flash' }}
        run: docker compose up -d

      - name: Health check
        run: |
          for i in $(seq 1 15); do
            if wget -qO- http://127.0.0.1:3002/api/health | grep -q '"ok":true'; then
              echo "✅ Smart Todo khoẻ mạnh"
              exit 0
            fi
            echo "Chờ app khởi động... ($i/15)"
            sleep 2
          done
          echo "❌ App không phản hồi sau 30s"
          docker compose logs --tail 80 todo
          exit 1

      - name: Clean up old images
        if: success()
        run: docker image prune -f
